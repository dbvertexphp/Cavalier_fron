<div class="max-w-4xl mx-auto mt-10 bg-white shadow-lg rounded-lg p-8 border border-gray-100">
  <h2 class="text-2xl font-black mb-6 text-center text-gray-800 uppercase tracking-widest">Add New Attendance</h2>

  <div class="mb-6 relative">
    <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Search Employee (Name or ID)</label>
    <div class="relative">
      <input type="text" 
             placeholder="Search name or employee code..." 
             [(ngModel)]="employeeSearch" 
             (input)="searchEmployee()"
             class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl outline-none focus:border-blue-500 shadow-sm" />
      
      <ul *ngIf="filteredEmployees.length" class="absolute z-50 w-full border mt-1 rounded-xl bg-white shadow-2xl max-h-60 overflow-y-auto">
        <li *ngFor="let emp of filteredEmployees" 
            (click)="selectEmployee(emp)" 
            class="px-5 py-3 hover:bg-blue-50 cursor-pointer flex justify-between border-b last:border-none">
          <div>
            <span class="font-bold text-gray-800">{{ emp.firstName }} {{ emp.lastName }}</span>
            <p class="text-[10px] text-gray-400 uppercase tracking-tighter">{{ emp.designation || 'Staff' }}</p>
          </div>
          <span class="text-xs font-bold text-blue-600 self-center">{{ emp.empCode }}</span>
        </li>
      </ul>
    </div>

    <div *ngIf="selectedEmployee" class="mt-4 p-4 bg-green-50 rounded-xl border border-green-200 flex items-center justify-between">
      <div>
        <p class="text-[10px] text-green-600 font-black uppercase">Active Selection</p>
        <p class="font-bold text-gray-800">{{ selectedEmployee.firstName }} {{ selectedEmployee.lastName }} ({{ selectedEmployee.empCode }})</p>
      </div>
      <button (click)="selectedEmployee = null; employeeSearch = ''" class="text-xs text-red-500 font-bold">Clear</button>
    </div>
  </div>

  <form (ngSubmit)="submitAttendance()" class="space-y-6">
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Shift Selection</label>
        <select name="shift" [(ngModel)]="attendance.shift" class="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl font-bold bg-gray-50">
          <option value="Morning">Morning Shift</option>
          <option value="Evening">Evening Shift</option>
          <option value="Night">Night Shift</option>
        </select>
      </div>
      <div>
        <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Attendance Date</label>
        <input type="date" name="attendanceDate" [(ngModel)]="attendance.attendanceDate" class="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl font-bold bg-gray-50" />
      </div>
    </div>

    <div>
      <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Attendance Mode (Source)</label>
      <div class="grid grid-cols-3 gap-2">
        <button type="button" (click)="setMode('Biometric')" 
                [class.bg-blue-600]="attendance.attendanceMode === 'Biometric'"
                [class.text-white]="attendance.attendanceMode === 'Biometric'"
                class="py-2.5 border-2 border-gray-100 rounded-lg text-[10px] font-black uppercase transition-all">Biometric</button>
        <button type="button" (click)="setMode('Manual')" 
                [class.bg-blue-600]="attendance.attendanceMode === 'Manual'"
                [class.text-white]="attendance.attendanceMode === 'Manual'"
                class="py-2.5 border-2 border-gray-100 rounded-lg text-[10px] font-black uppercase transition-all">Manual</button>
        <button type="button" (click)="setMode('GPS')" 
                [class.bg-blue-600]="attendance.attendanceMode === 'GPS'"
                [class.text-white]="attendance.attendanceMode === 'GPS'"
                class="py-2.5 border-2 border-gray-100 rounded-lg text-[10px] font-black uppercase transition-all">GPS Checkin</button>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div *ngIf="showCheckInTime">
        <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Manual Check-In Time</label>
        <input type="time" name="checkInTime" [(ngModel)]="attendance.checkInTime" class="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl font-bold bg-gray-50" />
      </div>
      <div [class.col-span-2]="!showCheckInTime">
        <label class="block mb-2 text-[11px] font-black text-gray-500 uppercase ml-1">Attendance Status</label>
        <select name="status" [(ngModel)]="attendance.attendanceStatus" class="w-full px-4 py-2.5 border-2 border-gray-100 rounded-xl font-bold bg-gray-50">
          <option value="Present">Present</option>
          <option value="Half Day">Half Day</option>
          <option value="Absent">Absent</option>
          <option value="Late">Late Entry</option>
        </select>
      </div>
    </div>

    <div class="flex gap-4 pt-6 border-t border-gray-50">
      <button type="button" (click)="cancel()" class="px-8 py-3 text-gray-400 font-bold uppercase text-[10px] hover:text-gray-600">Cancel</button>
      <button type="submit" [disabled]="!selectedEmployee || loading" 
              class="flex-1 py-3 bg-blue-700 disabled:bg-gray-300 text-white font-black rounded-xl shadow-lg uppercase text-[10px] tracking-widest active:scale-95 transition-all">
        {{ loading ? 'Processing...' : 'Save Attendance' }}
      </button>
    </div>
  </form>
</div>
