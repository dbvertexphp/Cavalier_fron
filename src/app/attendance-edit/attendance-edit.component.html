<div class="max-w-5xl mx-auto mt-8 bg-white shadow-2xl rounded-xl overflow-hidden border">
  <div class="bg-gray-800 px-6 py-4 flex justify-between items-center text-white">
    <h2 class="text-xl font-bold uppercase">Edit Attendance</h2>
    <span class="bg-yellow-400 text-black px-3 py-1 rounded-full text-xs font-bold">ID: {{attendance.empId}}</span>
  </div>

  <div class="p-6">
    <form (ngSubmit)="updateAttendance()" class="space-y-6">
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">Date</label>
          <input type="date" name="attendanceDate" [(ngModel)]="attendance.attendanceDate" class="w-full px-4 py-2 border rounded-lg" />
        </div>
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">Shift</label>
          <select name="shift" [(ngModel)]="attendance.shift" class="w-full px-4 py-2 border rounded-lg">
            <option value="Morning">Morning Shift</option>
            <option value="Evening">Evening Shift</option>
          </select>
        </div>
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">Status</label>
          <select name="status" [(ngModel)]="attendance.attendanceStatus" class="w-full px-4 py-2 border rounded-lg font-bold text-blue-600">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
            <option value="Half Day">Half Day</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4 p-4 bg-gray-50 rounded-lg">
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">In Time</label>
          <input type="time" name="checkInTime" [(ngModel)]="attendance.checkInTime" class="w-full px-4 py-2 border rounded-lg" />
        </div>
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">Out Time</label>
          <input type="time" name="checkOutTime" [(ngModel)]="attendance.checkOutTime" class="w-full px-4 py-2 border rounded-lg" />
        </div>
        <div>
          <label class="block mb-1 text-xs font-bold uppercase">Working Hours</label>
          <input type="number" name="workingHours" [(ngModel)]="attendance.workingHours" class="w-full px-4 py-2 border rounded-lg font-bold" />
        </div>
      </div>

      <div class="flex justify-end gap-4 pt-6 border-t">
        <button type="button" (click)="cancel()" class="px-6 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg">Cancel</button>
        <button type="submit" class="px-10 py-2 bg-yellow-500 text-white font-bold rounded-lg shadow-lg uppercase text-sm">
          {{ loading ? 'Updating...' : 'Update Record' }}
        </button>
      </div>
    </form>
  </div>
</div>
