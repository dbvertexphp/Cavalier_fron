<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">DEPARTMENTS</h2>
    <button (click)="openModal()" *ngIf="CheckPermissionService.hasPermission(PermissionID,'Add')" class="flex items-center gap-2 bg-[#654E51] text-white px-5 py-2.5 rounded-lg hover:bg-[#96736F] transition-all shadow-md active:scale-95">
      <span class="text-xl font-bold">+</span> Add Department
    </button> 
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="CheckPermissionService.hasPermission(PermissionID,'View')">
    <div *ngFor="let dept of departments; let i = index"  class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-lg transition-all group relative">
      
      <div class="absolute -top-2 -left-2 bg-gray-800 text-white text-[10px] font-bold px-2 py-1 rounded-md shadow-sm z-10">
        #{{ i + 1 }}
      </div>

      <div class="absolute top-12 right-4 flex flex-col gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
        <button (click)="editDept(dept)" *ngIf="CheckPermissionService.hasPermission(PermissionID,'Edit')" class="p-1.5 bg-blue-50 text-blue-600 rounded-md hover:bg-blue-600 hover:text-white transition-all shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
          </svg>
        </button>
        <button (click)="deleteDept(dept.id)" *ngIf="CheckPermissionService.hasPermission(PermissionID,'Delete')" class="p-1.5 bg-red-50 text-red-600 rounded-md hover:bg-red-600 hover:text-white transition-all shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </button>
      </div>

      <div class="flex justify-between items-start mb-4">
        <div class="p-3 bg-gray-100 rounded-lg text-[#654E51] group-hover:bg-[#654E51] group-hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
        </div>
        <div class="flex flex-col items-end">
          <span class="text-[10px] font-bold text-gray-400 bg-gray-50 px-2 py-0.5 rounded border">ID: DEPT-0{{dept.id}}</span>
        </div>
      </div>
      
      <h3 class="text-lg font-bold text-gray-800 mb-4">{{dept.name}}</h3>

      <div class="flex justify-between items-center pt-4 border-t border-gray-100">
        <span class="text-sm font-semibold text-[#96736F] bg-[#f8f5f5] px-3 py-1 rounded-full border border-[#f0e8e8]">
          {{dept.count}} Employees
        </span>
      </div>
    </div>
  </div>

  <div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
    </div>
</div>
