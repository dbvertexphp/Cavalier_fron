<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">ROLES</h2>
    <button *ngIf="CheckPermissionService.hasPermission(PermissionID,'Add')" (click)="openModal()" class="bg-[#654E51] text-white px-5 py-2.5 rounded-lg hover:bg-[#96736F] transition flex items-center gap-2 shadow-md">
      <span class="text-xl font-bold">+</span> Create Role
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-200">
        <tr>
          <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase w-16">S.No</th>
          <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase">Role Name</th>
          <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase text-center">Actions</th>
        </tr>
      </thead>
      <tbody *ngIf="CheckPermissionService.hasPermission(PermissionID,'View'); else noPermission"
       class="divide-y divide-gray-200">

  <tr *ngIf="rolesList.length === 0">
    <td colspan="3" class="px-6 py-10 text-center text-gray-400">
      No roles found.
    </td>
  </tr>

  <tr *ngFor="let role of rolesList; let i = index" class="hover:bg-gray-50 transition">
    <td class="px-6 py-4 text-sm text-gray-500">{{ i + 1 }}</td>
    <td class="px-6 py-4 font-medium text-gray-900">{{role.name}}</td>

    <td class="px-6 py-4">
      <div class="flex justify-center gap-2">

        <button
        (click)="editRole(role)"
        *ngIf="CheckPermissionService.hasPermission(PermissionID,'Edit')"
        class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-md transition"
        title="Edit">
          Edit
        </button>

        <button
        (click)="deleteRole(role.id)"
        *ngIf="CheckPermissionService.hasPermission(PermissionID,'Delete')"
        class="p-1.5 text-red-600 hover:bg-red-50 rounded-md transition"
        title="Delete">
          Delete
        </button>

      </div>
    </td>
  </tr>

</tbody>

<ng-template #noPermission>
  <tbody>
    <tr>
      <td colspan="3" class="px-6 py-10 text-center text-red-500 font-semibold">
        No Permission
      </td>
    </tr>
  </tbody>
</ng-template>
    </table>
  </div>

  <div *ngIf="isModalOpen"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">

  <div
    class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">

    <!-- HEADER -->
    <div
      class="bg-gradient-to-r from-[#654E51] to-[#4A3739] px-6 py-4 flex justify-between items-center text-white">
      <h3 class="text-lg font-bold tracking-wide">
        {{ isEditMode ? 'Edit Role' : 'Create New Role' }}
      </h3>
      <button (click)="closeModal()"
        class="text-white/70 hover:text-white text-2xl font-bold">&times;</button>
    </div>

    <!-- BODY -->
    <div class="p-6 space-y-6 max-h-[75vh] overflow-y-auto">

      <!-- ROLE NAME -->
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">
          Role Name
        </label>
        <input type="text" [(ngModel)]="newRole.name"
          (ngModelChange)="newRole.name = $event.toUpperCase()"
          placeholder="ENTER ROLE NAME..."
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#654E51] outline-none transition text-sm font-semibold uppercase shadow-sm">
      </div>

      <!-- STATUS -->
      <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border">
        <span class="text-sm font-semibold text-gray-700">Status</span>

        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" [(ngModel)]="newRole.status"
            class="w-5 h-5 accent-[#654E51]">

          <span
            class="text-sm font-bold"
            [ngClass]="newRole.status ? 'text-green-600' : 'text-red-500'">
            {{ newRole.status ? 'Active' : 'Inactive' }}
          </span>
        </label>
      </div>

      <!-- PERMISSION TABLE -->
      <div>
        <h4
          class="text-xs font-black text-[#654E51] uppercase tracking-widest mb-4 flex items-center gap-2">
          <span class="w-2 h-2 bg-[#654E51] rounded-full"></span>
          Permissions Matrix
        </h4>

        <div
          class="border rounded-2xl overflow-hidden bg-gray-50 shadow-inner">

          <div class="max-h-[350px] overflow-y-auto">

            <table class="w-full text-sm">

              <!-- HEADER -->
              <thead class="sticky top-0 bg-white border-b">
                <tr class="text-[10px] font-bold text-gray-500 uppercase">
                  <th class="p-4 text-left">Module</th>
                  <th class="p-4 text-center text-blue-500">View</th>
                  <th class="p-4 text-center text-amber-500">Edit</th>
                  <th class="p-4 text-center text-red-500">Delete</th>
                </tr>
              </thead>

              <!-- BODY -->
              <tbody class="divide-y">

                <tr *ngFor="let perm of permissionsList"
                  class="hover:bg-white transition">

                  <!-- MODULE -->
                  <td class="p-4">
                    <div class="flex items-center gap-3">
                      <input type="checkbox"
                        [checked]="selectedPermissionIds.includes(perm.permissionID)"
                        (change)="togglePermission(perm.permissionID)"
                        class="w-5 h-5 accent-[#654E51]">

                      <span class="font-semibold text-gray-700 text-xs uppercase">
                        {{ perm.subMenu }}
                      </span>
                    </div>
                  </td>

                  <!-- VIEW -->
                  <td class="text-center">
                    <input type="checkbox"
                      [checked]="selectedPermissionIds.includes(perm.permissionID + '_v')"
                      (change)="toggleView(perm.permissionID)"
                      class="w-4 h-4 accent-blue-500">
                  </td>

                  <!-- EDIT -->
                  <td class="text-center">
                    <input type="checkbox"
                      [checked]="selectedPermissionIds.includes(perm.permissionID + '_e')"
                      (change)="toggleEdit(perm.permissionID)"
                      class="w-4 h-4 accent-amber-500">
                  </td>

                  <!-- DELETE -->
                  <td class="text-center">
                    <input type="checkbox"
                      [checked]="selectedPermissionIds.includes(perm.permissionID + '_d')"
                      (change)="toggleDelete(perm.permissionID)"
                      class="w-4 h-4 accent-red-500">
                  </td>

                </tr>

              </tbody>

            </table>

          </div>
        </div>
      </div>

    </div>

    <!-- FOOTER -->
    <div
      class="px-6 py-4 border-t flex gap-3 bg-gray-50">

      <button (click)="closeModal()"
        class="flex-1 py-2 rounded-xl border text-gray-600 hover:bg-gray-100 font-semibold">
        Cancel
      </button>

      <button (click)="saveRole()"
        [disabled]="isLoading || !newRole.name"
        class="flex-1 py-2 rounded-xl bg-[#654E51] text-white font-semibold hover:bg-[#4A3739] shadow-md disabled:bg-gray-400">

        {{ isLoading ? 'Processing...' : (isEditMode ? 'Update Role' : 'Save Role') }}

      </button>

    </div>

  </div>
</div>
</div>

<div *ngIf="showPopup" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm">
  <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm text-center border border-gray-100">
    <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <h3 class="text-xl font-bold text-gray-800 mb-2">Delete Role?</h3>
    <p class="text-gray-500 mb-6">You want delete role</p>
    <div class="flex gap-3">
      <button (click)="cancelDelete()" class="flex-1 px-4 py-2 bg-gray-100 text-gray-600 font-semibold rounded-lg hover:bg-gray-200 transition">Cancel</button>
      <button (click)="confirmDelete()" class="flex-1 px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 shadow-md transition">Confirm Delete</button>
    </div>
  </div>
</div>
