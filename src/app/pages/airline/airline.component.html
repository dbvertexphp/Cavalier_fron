<div class="p-3 bg-gray-100 min-h-screen font-sans text-[13px]">
  <div class="bg-white border border-gray-300 shadow-sm rounded-sm overflow-hidden">

    <!-- Top Header Bar -->
    <div class="bg-[#4a3f3f] p-3 flex justify-between items-center text-white">
      <div class="font-bold uppercase tracking-widest px-2 text-[12px]">
        Airline Master
      </div>
      <button
        (click)="openAddModal()"
        class="bg-green-600 hover:bg-green-700 px-5 py-1.5 text-[12px] font-bold shadow-sm flex items-center gap-2 transition-all"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
        </svg>
        ADD NEW AIRLINE
      </button>
    </div>

    <!-- Table -->
    <div class="p-0 overflow-x-auto">
      <table class="w-full border-collapse border border-gray-200 whitespace-nowrap">
        <thead>
          <tr class="bg-gray-50 text-gray-600 uppercase text-[11px] border-b">
            <th class="p-4 text-left font-bold border-r border-gray-200">Name</th>
            <th class="p-4 text-left font-bold border-r border-gray-200">Code</th>
            <th class="p-4 text-left font-bold border-r border-gray-200">Prefix</th>
            <th class="p-4 text-left font-bold border-r border-gray-200">Status</th>
            <th class="p-4 text-center font-bold sticky right-0 bg-gray-50 border-l shadow-sm">Actions</th>
          </tr>
        </thead>

        <tbody class="bg-white">
          <tr
            *ngFor="let a of airlines"
            class="hover:bg-gray-50 border-b text-gray-700 transition-colors"
          >
            <td class="p-4 font-bold text-gray-900">{{ a.airlineName }}</td>
            <td class="p-4 font-mono uppercase font-medium">{{ a.airlineCode }}</td>
            <td class="p-4 font-mono font-medium">{{ a.airlinePrefix }}</td>
            <td class="p-4">
              <span
                (click)="$event.stopPropagation()"
                class="flex items-center gap-2 px-3 py-1.5 rounded-md font-medium text-[11px] shadow-sm border w-fit"
                [ngClass]="a.isActive
                  ? 'bg-green-50 text-green-600 border-green-200'
                  : 'bg-gray-50 text-gray-500 border-gray-200'"
              >
                <span class="relative flex h-2 w-2">
                  <span
                    *ngIf="a.isActive"
                    class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
                  ></span>
                  <span
                    [class]="a.isActive ? 'bg-green-500' : 'bg-gray-500'"
                    class="relative inline-flex rounded-full h-2 w-2"
                  ></span>
                </span>
                <span>{{ a.isActive ? 'Active' : 'Inactive' }}</span>
              </span>
            </td>
            <td class="p-4 sticky right-0 bg-white border-l text-center shadow-[-5px_0_10px_rgba(0,0,0,0.02)]">
              <div class="flex justify-center gap-2">
                <button
                  title="Edit"
                  (click)="openEditModal(a)"
                  class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-blue-600 border border-blue-200 rounded-md hover:bg-blue-600 hover:text-white transition-all font-medium text-[11px] shadow-sm"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                  </svg>
                  <span>Edit</span>
                </button>

                <button
                  title="Delete"
                  (click)="deleteAirline(a.id!)"
                  class="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-md hover:bg-red-600 hover:text-white transition-all font-medium text-[11px] shadow-sm"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                  </svg>
                  <span>Delete</span>
                </button>
              </div>
            </td>
          </tr>

          <!-- Empty State -->
          <tr *ngIf="!airlines || airlines.length === 0">
            <td colspan="5" class="p-0">
              <div class="flex flex-col items-center justify-center py-10 gap-4 text-gray-400 bg-gray-50/50">
                <span class="text-4xl opacity-50">✈️</span>
                <p class="text-lg uppercase">No Airlines Found</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ✅ MODAL (Dark Header Theme Matching Inquiry Modal) -->
<div
  *ngIf="isModalOpen"
  class="fixed inset-0 z-[1050] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm"
>
  <div class="relative bg-white w-full max-w-md rounded-sm shadow-2xl overflow-hidden border border-gray-200 animate-in fade-in zoom-in duration-200">

    <!-- Header -->
    <div class="bg-[#4a3f3f] text-white px-6 py-4 flex items-center justify-between">
      <h4 class="text-[13px] font-bold uppercase tracking-widest">
        {{ editMode ? 'Edit Airline' : 'New Airline Entry' }}
      </h4>
      <button
        (click)="closeModal()"
        class="text-white/70 hover:text-white transition-colors text-xl leading-none"
      >
        &times;
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4 bg-gray-50">
      <div>
        <label class="block font-bold text-gray-600 text-[12px] mb-1">Airline Name</label>
        <input
          type="text"
          [(ngModel)]="form.airlineName"
          name="airlineName"
          placeholder="e.g. Air India"
          class="w-full border border-gray-300 p-2 outline-none text-[12px] rounded-sm bg-white focus:border-[#4a3f3f]"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block font-bold text-gray-600 text-[12px] mb-1">Code (IATA)</label>
          <input
            type="text"
            [(ngModel)]="form.airlineCode"
            name="airlineCode"
            maxlength="2"
            placeholder="AI"
            class="w-full border border-gray-300 p-2 outline-none text-[12px] uppercase rounded-sm bg-white focus:border-[#4a3f3f]"
          />
        </div>
        <div>
          <label class="block font-bold text-gray-600 text-[12px] mb-1">Prefix (AWB)</label>
          <input
            type="text"
            [(ngModel)]="form.airlinePrefix"
            name="airlinePrefix"
            maxlength="3"
            placeholder="098"
            class="w-full border border-gray-300 p-2 outline-none text-[12px] rounded-sm bg-white focus:border-[#4a3f3f]"
          />
        </div>
      </div>

      <div class="flex items-center gap-2 pt-1">
        <input
          type="checkbox"
          [(ngModel)]="form.isActive"
          name="isActive"
          id="isActive"
          class="h-4 w-4 accent-[#4a3f3f] border-gray-300 rounded cursor-pointer"
        />
        <label for="isActive" class="text-[12px] font-bold text-gray-600 cursor-pointer">Active</label>
      </div>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 border-t px-6 py-4 flex justify-end gap-3">
      <button
        (click)="closeModal()"
        class="bg-gray-200 text-gray-700 px-6 py-1.5 font-bold shadow-sm uppercase text-[11px] hover:bg-gray-300 transition-all"
      >
        Cancel
      </button>
      <button
        (click)="saveAirline()"
        class="bg-[#4a3f3f] text-white px-6 py-1.5 font-bold shadow-md uppercase text-[11px] hover:bg-black transition-all"
      >
        {{ editMode ? 'Update' : 'Save' }}
      </button>
    </div>
  </div>
</div>
