<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">DEPARTMENTS</h2>
    <button (click)="openModal()" class="bg-[#654E51] text-white px-5 py-2.5 rounded-lg hover:bg-[#96736F]">+ Add Department</button> 
  </div>

  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 text-gray-600 text-sm">
        <tr>
          <th class="px-6 py-4">#</th>
          <th class="px-6 py-4">Department Name</th>
          <!-- <th class="px-6 py-4">Employees</th> -->
          <th class="px-6 py-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let dept of departments; let i = index" class="hover:bg-gray-50">
          <td class="px-6 py-4 font-bold text-gray-400">#{{ i + 1 }}</td>
          <td class="px-6 py-4 font-semibold text-gray-800">{{ dept.name }}</td>
          <!-- <td class="px-6 py-4">{{ dept.count || 0 }}</td> -->
          <td class="px-6 py-4 text-right space-x-2">
            <button (click)="openModal(dept)" class="text-blue-600 hover:underline px-2">Edit</button>
            <button (click)="deleteDept(dept.id)" class="text-red-600 hover:underline px-2">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
    <div class="bg-gray-50 px-6 py-4 border-b font-bold">{{ isEditMode ? 'Edit Department' : 'Create New Department' }}</div>
    <div class="p-6">
      <label class="block text-xs font-bold text-gray-400 mb-2">DEPARTMENT NAME</label>
      <input type="text" [(ngModel)]="newDept.name" class="w-full px-4 py-2 border rounded-lg uppercase" placeholder="E.G. SALES">
    </div>
    <div class="px-6 py-4 bg-gray-50 flex gap-3">
      <button (click)="closeModal()" class="flex-1 px-4 py-2 border rounded-lg">Cancel</button>
      <button (click)="saveDepartment()" class="flex-1 px-4 py-2 bg-[#654E51] text-white rounded-lg">Save</button>
    </div>
  </div>
</div>
