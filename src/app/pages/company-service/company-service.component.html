<div class="p-6 min-h-screen bg-transparent relative">
  
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl font-black text-gray-800 tracking-tight">Company Services</h2>
    
    <button (click)="openModal()" 
      *ngIf="CheckPermissionService.hasPermission(PermissionID, 'Add')" 
      class="flex items-center gap-2 px-7 py-3 bg-[#5d4b4b] text-white rounded-xl font-black shadow-lg hover:brightness-110 transition-all active:scale-95 uppercase text-sm tracking-wider">
      <span class="text-xl leading-none">+</span> Add Service
    </button>
  </div>

  <div class="bg-white rounded-[24px] shadow-2xl border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50/80 border-b border-gray-100">
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[2px] text-gray-400 w-20">S.No</th>
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[2px] text-gray-400">Services</th>
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[2px] text-gray-400 text-center">Status</th>
            <th class="px-8 py-5 text-[10px] font-black uppercase tracking-[2px] text-gray-400 text-center">Actions</th>
          </tr>
        </thead>
        
        <tbody class="divide-y divide-gray-50" *ngIf="CheckPermissionService.hasPermission(PermissionID, 'View')">
          
          <tr *ngIf="services.length === 0">
            <td colspan="4" class="px-8 py-10 text-center text-gray-400 font-bold uppercase text-[10px] tracking-widest">
              No services found
            </td>
          </tr>

          <tr *ngFor="let s of services; let i = index" class="group hover:bg-blue-50/40 transition-all duration-200">
            <td class="px-8 py-6 border-r border-gray-50 text-[12px] font-bold text-gray-400">{{ i + 1 }}</td>
            <td class="px-8 py-6 border-r border-gray-50">
              <span class="text-[#1e293b] font-black text-[14px] uppercase tracking-wide group-hover:text-blue-700 transition-colors">
                {{ s.serviceName }}
              </span>
            </td>

            <td class="px-8 py-6 border-r border-gray-50 text-center">
              <div class="flex flex-col items-center gap-2">
                <button (click)="toggleStatus(s)" class="relative w-11 h-6 rounded-full transition-all duration-300"
                  [ngClass]="s.isActive ? 'bg-emerald-500' : 'bg-gray-300'">
                  <span class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-all duration-300"
                    [ngClass]="s.isActive ? 'translate-x-5' : 'translate-x-0'"></span>
                </button>
                <span class="text-[10px] font-semibold uppercase tracking-wider"
                  [ngClass]="s.isActive ? 'text-emerald-600' : 'text-gray-400'">
                  {{ s.isActive ? 'Active' : 'Inactive' }}
                </span>
              </div>
            </td>

            <td class="px-8 py-6 text-center">
              <div class="flex items-center justify-center gap-6">
                <button (click)="modifyService(s)" *ngIf="CheckPermissionService.hasPermission(PermissionID, 'Edit')" class="transition-transform hover:scale-125">✏️</button>
                <button (click)="deleteService(s.id)" *ngIf="CheckPermissionService.hasPermission(PermissionID, 'Delete')" class="transition-transform hover:scale-125">🗑️</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div *ngIf="isModalOpen" class="fixed inset-0 z-[999] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
      <div class="p-8">
        <h2 class="text-xl font-black text-gray-800 uppercase tracking-tight mb-6">
          {{ isEditMode ? 'Edit Service' : 'Add New Service' }}
        </h2>
        
        <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2">Service Name</label>
        <input [(ngModel)]="newServiceName" 
               class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#5d4b4b]/20 focus:bg-white transition-all text-sm font-bold"
               placeholder="E.G. WEB DEVELOPMENT">

        <div class="flex gap-4 mt-8">
          <button (click)="saveService()" class="flex-1 px-6 py-4 bg-emerald-500 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-emerald-600 active:scale-95 transition-all">
            {{ isEditMode ? 'Update' : 'Save' }}
          </button>
          <button (click)="closeModal()" class="flex-1 px-6 py-4 bg-gray-100 text-gray-400 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-gray-200 active:scale-95 transition-all">
            Cancel
          </button>
        </div>
      </div>
    </div>
  </div>

</div>
