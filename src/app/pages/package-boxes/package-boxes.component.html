<div class="p-3 md:p-6">
  <div class="flex flex-row justify-between items-center mb-6 gap-2">
    <h2 class="text-xl md:text-2xl font-bold text-gray-800">PACKAGE BOXES</h2>
    <button (click)="openModal()" class="bg-[#654E51] text-white px-5 py-2.5 rounded-lg hover:bg-[#4A3739]">
      + Add Box
    </button>
  </div>

  <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b">
        <tr>
          <th class="px-6 py-4 text-xs font-semibold uppercase">S.No</th>
          <th class="px-6 py-4 text-xs font-semibold uppercase">Name</th>
          <th class="px-6 py-4 text-xs font-semibold uppercase text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let box of boxesList; let i = index" class="border-b">
          <td class="px-6 py-4">{{ i + 1 }}</td>
          <td class="px-6 py-4 uppercase font-bold">{{ box.name }}</td>
          <td class="px-6 py-4 text-center">
            <button (click)="openModal(box)" class="text-blue-600 mr-4 font-semibold hover:underline">Edit</button>
            <button (click)="deleteBox(box.id)" class="text-red-600 font-semibold hover:underline">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 space-y-4 shadow-xl">
      <h3 class="font-bold text-lg">{{ isEditMode ? 'Edit' : 'Add New' }} Box</h3>
      <input [(ngModel)]="newBox.name" class="w-full p-2 border rounded outline-none" placeholder="Enter Box Name">
      
      <div class="flex gap-2 pt-4">
        <button (click)="closeModal()" class="flex-1 p-2 bg-gray-200 rounded hover:bg-gray-300">Cancel</button>
        <button (click)="saveBox()" class="flex-1 p-2 bg-[#654E51] text-white rounded hover:bg-[#4A3739]">Save</button>
      </div>
    </div>
  </div>
</div>
