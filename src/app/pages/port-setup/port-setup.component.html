<div class="p-6 min-h-screen bg-gray-50/50">
  <div class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight uppercase">Port Setup</h1>
      <p class="text-sm text-gray-500">Configure Ports Database & Sequence</p>
    </div>
    <div class="flex gap-3">
      <button (click)="resetFilters()" class="p-2.5 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 shadow-sm transition-all">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
      <button (click)="openModal()" class="flex items-center gap-2 bg-[#654E51] text-white px-5 py-2.5 rounded-lg hover:bg-[#4A3739] transition-all shadow-md">
        <span class="text-xl font-bold">+</span>
        <span class="font-bold">Add New Port</span>
      </button>
    </div>
  </div>

  <div class="mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
    <div class="space-y-1">
      <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Country Search</label>
      <input type="text" [(ngModel)]="searchCountry" placeholder="Filter by Country..." class="w-full px-4 py-2.5 rounded-xl bg-gray-50 border-none text-sm outline-none focus:ring-2 focus:ring-[#654E51]">
    </div>
    <div class="space-y-1">
      <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Port Name</label>
      <input type="text" [(ngModel)]="searchPortName" placeholder="Search Port..." class="w-full px-4 py-2.5 rounded-xl bg-gray-50 border-none text-sm outline-none focus:ring-2 focus:ring-[#654E51]">
    </div>
    <div class="space-y-1">
      <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Function Search</label>
      <input type="text" [(ngModel)]="searchFunction" placeholder="e.g. 1-345---" class="w-full px-4 py-2.5 rounded-xl bg-gray-50 border-none text-sm outline-none focus:ring-2 focus:ring-[#654E51] font-mono">
    </div>
    <div class="space-y-1">
      <label class="text-[10px] font-black text-[#654E51] uppercase tracking-widest ml-1">Quick Search</label>
      <input type="text" [(ngModel)]="quickSearch" placeholder="Search for..." class="w-full px-4 py-2.5 rounded-xl bg-emerald-50/50 border border-emerald-100 text-sm outline-none focus:ring-2 focus:ring-[#654E51]">
    </div>
  </div>

  <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-50 border-b border-gray-100">
          <tr class="flex w-full" cdkDropList cdkDropListOrientation="horizontal" (cdkDropListDropped)="onColumnDrop($event)">
            <th class="w-14 px-6 py-4"></th> <ng-container *ngFor="let col of displayedColumns">
              <th *ngIf="col === 'sno'" cdkDrag class="w-16 px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-widest cursor-move">S.No</th>
              <th *ngIf="col === 'name'" cdkDrag class="flex-1 px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-widest cursor-move">Port Name & Country</th>
              <th *ngIf="col === 'code'" cdkDrag class="w-32 px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-widest text-center cursor-move">Code</th>
              <th *ngIf="col === 'function'" cdkDrag class="w-48 px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-widest cursor-move">Function</th>
              <th *ngIf="col === 'actions'" class="w-32 px-6 py-4 text-xs font-black text-gray-400 uppercase tracking-widest text-right">Actions</th>
            </ng-container>
          </tr>
        </thead>
        <tbody class="block w-full max-h-[60vh] overflow-y-auto" cdkDropList [cdkDropListData]="allPorts" (cdkDropListDropped)="onDrop($event)">
          @for(port of filteredPorts; track port.id; let i = $index) {
          <tr cdkDrag class="flex w-full items-center group hover:bg-emerald-50/30 transition-colors border-b border-gray-50 cursor-move bg-white">
            <td class="w-14 px-6 py-4 flex items-center justify-center text-gray-300">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 6h2v2H8V6zm6 0h2v2h-2V6zm-6 4h2v2H8v-2zm6 0h2v2h-2v-2zm-6 4h2v2H8v-2zm6 0h2v2h-2v-2z" /></svg>
            </td>
            <ng-container *ngFor="let col of displayedColumns">
              <td *ngIf="col === 'sno'" class="w-16 px-6 py-4 text-sm font-bold text-gray-400">{{ i + 1 }}</td>
              <td *ngIf="col === 'name'" class="flex-1 px-6 py-4">
                <div class="font-bold text-gray-700 uppercase">{{ port.name }}</div>
                <div class="text-[10px] text-gray-400 font-medium uppercase tracking-tight">{{ port.country }}</div>
              </td>
              <td *ngIf="col === 'code'" class="w-32 px-6 py-4 text-center">
                <span class="px-3 py-1 bg-emerald-100 text-emerald-600 text-[11px] font-black rounded-lg uppercase border border-emerald-200">{{ port.code }}</span>
              </td>
              <td *ngIf="col === 'function'" class="w-48 px-6 py-4">
                <span class="font-mono text-sm text-gray-500 bg-gray-100 px-2 py-1 rounded-md">{{ port.function }}</span>
              </td>
              <td *ngIf="col === 'actions'" class="w-32 px-6 py-4 text-right">
                <div class="flex justify-end gap-2">
                  <button (click)="editPort(port); $event.stopPropagation()" class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition-all">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                  </button>
                  <button (click)="deletePort(port.id); $event.stopPropagation()" class="p-2 text-red-500 hover:bg-red-50 rounded-xl transition-all">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                  </button>
                </div>
              </td>
            </ng-container>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
