<div class="relative">
  <button (click)="toggleDropdown()" class="flex items-center text-gray-700 dropdown-toggle dark:text-gray-400">
    <span class="mr-3 overflow-hidden rounded-full h-11 w-11">
      <img [src]="gender === 'Female' ? '/images/assets/female.png' : '/images/assets/male.png'" alt="User" />
    </span>
    <span class="block mr-1 font-medium text-theme-sm" style="color:white">{{userName}}</span>
    <svg [ngClass]="{'rotate-180': isOpen}" width="18" height="20" viewBox="0 0 18 20" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
      <path d="M4.3125 8.65625L9 13.3437L13.6875 8.65625" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <app-dropdown [isOpen]="isOpen" (close)="closeDropdown()"
    className="absolute right-0 mt-[17px] flex w-[260px] flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark">
    
    <div>
      <span class="block font-medium text-gray-700 text-theme-sm dark:text-gray-400">{{ firstName }} {{ lastName }}</span>
      <span class="mt-0.5 block text-theme-xs text-gray-500 dark:text-gray-400">{{ email }}</span>
    </div>

    <ul class="flex flex-col gap-1 pt-4 pb-3 border-b border-gray-200 dark:border-gray-800">
      <li>
        <app-dropdown-item-two (itemClick)="closeDropdown()" tag="a" [to]="'/dashboard/profile'"
          className="flex items-center gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300">
          Edit profile
        </app-dropdown-item-two>
      </li>
      <li>
        <button (click)="changePassword(); closeDropdown()" class="w-full flex items-center gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5">
          Change Password
        </button>
      </li>
    </ul>

    <a (click)="logout()" class="flex items-center gap-3 px-3 py-2 mt-3 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 hover:text-gray-700 cursor-pointer">
       Sign out
    </a>
  </app-dropdown>
</div>
<div *ngIf="showPasswordModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
  <div class="bg-white w-full max-w-[400px] p-8 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-gray-100 animate-in fade-in zoom-in duration-300">
    <h2 class="text-2xl font-bold text-[#654E51] mb-2 text-center">Change Password</h2>
    <p class="text-gray-500 text-sm text-center mb-8">Enter your current password to update it.</p>
    
    <div class="flex flex-col gap-5">
      <ng-template #eyeIcon let-show="show">
        <svg *ngIf="!show" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
        <svg *ngIf="show" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
        </svg>
      </ng-template>

      <div class="relative group">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Current Password</label>
        <input [(ngModel)]="passData.currentPassword" [type]="showPass1 ? 'text' : 'password'" class="w-full mt-1.5 p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-[#654E51] focus:ring-2 focus:ring-[#654E51]/20 outline-none transition-all">
        <button type="button" (click)="showPass1 = !showPass1" class="absolute right-4 top-[38px] text-gray-400 hover:text-[#654E51]">
          <ng-container *ngTemplateOutlet="eyeIcon; context: {show: showPass1}"></ng-container>
        </button>
      </div>

      <div class="relative">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">New Password</label>
        <input [(ngModel)]="passData.newPassword" [type]="showPass2 ? 'text' : 'password'" class="w-full mt-1.5 p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-[#654E51] focus:ring-2 focus:ring-[#654E51]/20 outline-none transition-all">
        <button type="button" (click)="showPass2 = !showPass2" class="absolute right-4 top-[38px] text-gray-400 hover:text-[#654E51]">
          <ng-container *ngTemplateOutlet="eyeIcon; context: {show: showPass2}"></ng-container>
        </button>
      </div>

      <div class="relative">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Confirm Password</label>
        <input [(ngModel)]="passData.confirmPassword" [type]="showPass3 ? 'text' : 'password'" class="w-full mt-1.5 p-4 rounded-2xl bg-gray-50 border border-gray-200 focus:bg-white focus:border-[#654E51] focus:ring-2 focus:ring-[#654E51]/20 outline-none transition-all">
        <button type="button" (click)="showPass3 = !showPass3" class="absolute right-4 top-[38px] text-gray-400 hover:text-[#654E51]">
          <ng-container *ngTemplateOutlet="eyeIcon; context: {show: showPass3}"></ng-container>
        </button>
      </div>
    </div>

    <div class="flex gap-3 mt-10">
      <button (click)="showPasswordModal = false" class="flex-1 py-4 rounded-2xl border border-gray-200 text-gray-600 font-bold hover:bg-gray-50 transition-all">Cancel</button>
      <button (click)="submitPassword()" class="flex-1 py-4 rounded-2xl bg-[#654E51] text-white font-bold hover:bg-[#4d3a3d] shadow-lg shadow-[#654E51]/30 transition-all">Update</button>
    </div>
  </div>
</div>
