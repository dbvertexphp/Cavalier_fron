<!-- Address Display Card -->
<div class="p-5 border border-gray-200 rounded-2xl dark:border-gray-800 lg:p-6">
  <div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between">
    <div>
      <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90 lg:mb-6">
        Address
      </h4>
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-2 lg:gap-7 2xl:gap-x-32">
        <div>
          <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-400">
            Country
          </p>
          <p class="text-sm font-medium text-gray-800 dark:text-white/90">
            {{ address.country }}
          </p>
        </div>
        <div>
          <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-400">
            City/State
          </p>
          <p class="text-sm font-medium text-gray-800 dark:text-white/90">
            {{ address.cityState }}
          </p>
        </div>
        <div>
          <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-400">
            Postal Code
          </p>
          <p class="text-sm font-medium text-gray-800 dark:text-white/90">
            {{ address.postalCode }}
          </p>
        </div>
        <div>
          <p class="mb-2 text-xs leading-normal text-gray-500 dark:text-gray-400">
            TAX ID
          </p>
          <p class="text-sm font-medium text-gray-800 dark:text-white/90">
            {{ address.taxId }}
          </p>
        </div>
      </div>
    </div>
    
    <app-button 
      variant="outline" 
      size="sm" 
      (btnClick)="openModal()">
      Edit
    </app-button>
  </div>

  <!-- Modal -->
  <app-modal
    [isOpen]="isOpen"
    (close)="closeModal()"
    className="max-w-[700px] m-4"
  >
    <div class="relative w-full p-4 overflow-y-auto bg-white no-scrollbar rounded-3xl dark:bg-gray-900 lg:p-11">
      <div class="px-2 pr-14">
        <h4 class="mb-2 text-2xl font-semibold text-gray-800 dark:text-white/90">
          Edit Address
        </h4>
        <p class="mb-6 text-sm text-gray-500 dark:text-gray-400 lg:mb-7">
          Update your details to keep your profile up-to-date.
        </p>
      </div>
      <form class="flex flex-col" (ngSubmit)="handleSave()">
        <div class="px-2 overflow-y-auto custom-scrollbar">
          <div class="grid grid-cols-1 gap-x-6 gap-y-5 lg:grid-cols-2">
            <div>
              <app-label>Country</app-label>
              <app-input-field type="text" [(ngModel)]="address.country" name="country" />
            </div>
            <div>
              <app-label>City/State</app-label>
              <app-input-field type="text" [(ngModel)]="address.cityState" name="cityState" />
            </div>
            <div>
              <app-label>Postal Code</app-label>
              <app-input-field type="text" [(ngModel)]="address.postalCode" name="postalCode" />
            </div>
            <div>
              <app-label>TAX ID</app-label>
              <app-input-field type="text" [(ngModel)]="address.taxId" name="taxId" />
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3 px-2 mt-6 lg:justify-end">
          <!-- FIX: "ghost" ki jagah "outline" kar diya -->
          <app-button size="sm" variant="outline" (btnClick)="closeModal()">Close</app-button>
          <app-button size="sm" variant="primary" (btnClick)="handleSave()">Save Changes</app-button>
        </div>
      </form>
    </div>
  </app-modal>
</div>
