<div class="p-5 border border-gray-200 rounded-2xl dark:border-gray-800 lg:p-6">
  <div class="flex flex-col items-center gap-5 lg:flex-row lg:justify-between">
    <div class="flex flex-col items-center gap-4 lg:flex-row">
      <!-- Avatar -->
      <div class="relative w-20 h-20 overflow-hidden rounded-full">
        <img [src]="user.avatar" alt="user" class="object-cover w-full h-full" />
      </div>

      <!-- Info -->
      <div class="text-center lg:text-left">
        <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90">
          {{ user.firstName }} {{ user.lastName }}
        </h4>
        <p class="text-sm text-gray-500 dark:text-gray-400">
          {{ user.role }} <!-- Role displayed here -->
        </p>
        <p class="mt-1 text-xs text-gray-400">
          <i class="fa fa-map-marker"></i> {{ user.location }} <!-- Address/Location here -->
        </p>
      </div>
    </div>

    <!-- Edit Button -->
    <app-button variant="outline" size="sm" (btnClick)="openModal()">
      Edit Profile
    </app-button>
  </div>

  <!-- Profile Modal -->
  <app-modal [isOpen]="isOpen" (close)="closeModal()" className="max-w-[600px]">
    <div class="p-6 bg-white dark:bg-gray-900 rounded-2xl">
      <h4 class="mb-4 text-xl font-bold">Edit Basic Info</h4>
      
      <form (ngSubmit)="handleSave()" class="space-y-4">
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
          <div>
            <app-label>First Name</app-label>
            <app-input-field name="fname" [(ngModel)]="user.firstName" />
          </div>
          <div>
            <app-label>Last Name</app-label>
            <app-input-field name="lname" [(ngModel)]="user.lastName" />
          </div>
        </div>

        <div>
          <app-label>Designation / Role</app-label>
          <app-input-field name="role" [(ngModel)]="user.role" />
        </div>

        <div>
          <app-label>Bio</app-label>
          <app-input-field name="bio" [(ngModel)]="user.bio" />
        </div>

        <div class="flex justify-end gap-3 mt-6">
          <app-button variant="outline" (btnClick)="closeModal()">Cancel</app-button>
          <app-button (btnClick)="handleSave()">Update</app-button>
        </div>
      </form>
    </div>
  </app-modal>
</div>
