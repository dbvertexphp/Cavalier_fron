<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cavalier Logistics Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="logo.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary:   '#2563eb',
            secondary: '#9333ea',
            accent:    '#22c55e',
          }
        }
      }
    }
  </script>

  <style>
    /* ══════════════════════════════════════════
       SPLASH SCREEN — Simple Minimal Loader
       ══════════════════════════════════════════ */
    #cavalier-splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;  /* No background color */
      transition: opacity 0.4s ease;
      opacity: 1;
    }

    /* ── Simple Loader ── */
    #splash-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* Simple Spinner */
    .simple-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(220, 38, 38, 0.2);
      border-top-color: #4a3f3f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* Small text */
    #splash-text {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* ── Keyframes ── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Fade out ── */
    #cavalier-splash.fade-out {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    
    app-root.show-app {
      display: block !important;
      animation: showApp 0.3s ease-out forwards;
    }
    
    @keyframes showApp {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>

<body>
  <!-- ══ SPLASH — Simple Minimal Loader ══ -->
  <div id="cavalier-splash">
    <div id="splash-loader">
      <div class="simple-spinner"></div>
      <div id="splash-text">Loading...</div>
    </div>
  </div>
  <!-- ══ END SPLASH ══ -->

  <!-- Angular mounts here -->
  <app-root style="display: none;"></app-root>
</body>
</html>
